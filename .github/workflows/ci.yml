name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Catch breakage from upstream Home Assistant changes even without
    # a new commit (mirrors the official hassfest action's recommendation).
    - cron: "0 0 * * *"

jobs:
  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]" --config-settings editable_mode=compat

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format --check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" --config-settings editable_mode=compat

      - name: Run pytest with coverage
        run: pytest --cov=custom_components.aviation_weather --cov-report=term-missing

  validate-airport-data:
    name: Validate airport database (fresh data)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]" --config-settings editable_mode=compat

      - name: Download latest source data
        run: python -m scripts.update_airports

      - name: Validate downloaded data
        run: python -m scripts.validate_airports

      - name: Generate airport database from fresh data
        run: python -m scripts.generate_airports

      - name: Run test suite against the freshly generated data
        run: pytest
