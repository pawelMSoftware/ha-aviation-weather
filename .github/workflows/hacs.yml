name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Catch breakage from HACS validation rule changes even without a
    # new commit (same rationale as hassfest's schedule in ci.yml).
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: Validate with HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
