name: Release

# Source of truth for the release version is manifest.json's "version"
# field. Bumping it and merging to main is the entire release process:
# this workflow detects the change, tags it, and publishes a GitHub
# Release with a HACS-installable zip attached. No manual tagging.
on:
  push:
    branches:
      - main
    paths:
      - "custom_components/aviation_weather/manifest.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: manifest
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/aviation_weather/manifest.json'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        id: check
        run: |
          if git rev-parse "${{ steps.manifest.outputs.tag }}" >/dev/null 2>&1; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest version matches pyproject.toml
        if: steps.check.outputs.already_released == 'false'
        run: |
          pyproject_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          manifest_version="${{ steps.manifest.outputs.version }}"
          if [ "$pyproject_version" != "$manifest_version" ]; then
            echo "::error::manifest.json version ($manifest_version) does not match pyproject.toml version ($pyproject_version). Update both together."
            exit 1
          fi

      - name: Build release zip
        if: steps.check.outputs.already_released == 'false'
        run: |
          cd custom_components/aviation_weather
          zip -r "${{ github.workspace }}/aviation_weather.zip" . -x "__pycache__/*" "*/__pycache__/*"

      - name: Create tag and GitHub Release
        if: steps.check.outputs.already_released == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: ${{ steps.manifest.outputs.tag }}
          generate_release_notes: true
          files: aviation_weather.zip

      - name: Already released, nothing to do
        if: steps.check.outputs.already_released == 'true'
        run: |
          echo "Version ${{ steps.manifest.outputs.version }} (tag ${{ steps.manifest.outputs.tag }}) already has a release. Skipping."
